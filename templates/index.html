<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Recommender</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1rem;
    }

    .container { width: 100%; max-width: 520px; }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.5rem;
    }

    .logo { width: 36px; height: 36px; }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1DB954;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .search-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 50px;
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    .search-box:focus-within { border-color: #1DB954; }

    .search-box input, .artist-box input {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      flex: 1;
    }

    .search-box input::placeholder,
    .artist-box input::placeholder { color: #555; }

    .artist-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 50px;
      padding: 0.7rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .artist-box input { color: #aaa; font-size: 13px; }

    .btn {
      width: 100%;
      background: #1DB954;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 0.9rem;
      font-size: 15px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
      margin-bottom: 2rem;
    }

    .btn:hover { background: #1ed760; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    .error {
      display: none;
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      color: #e74c3c;
      font-size: 13px;
      margin-bottom: 1rem;
    }

    .error.active { display: block; }

    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
      color: #555;
      font-size: 14px;
    }

    .loading.active { display: block; }

    .results-title {
      font-size: 13px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0.75rem 0;
      border-bottom: 1px solid #1a1a1a;
      animation: fadeIn 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .track-num {
      font-size: 13px;
      color: #555;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .track-art {
      width: 42px;
      height: 42px;
      border-radius: 4px;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pop-badge {
      font-size: 11px;
      color: #1DB954;
      background: rgba(29,185,84,0.1);
      padding: 3px 8px;
      border-radius: 50px;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #333;
    }

    .empty-icon { font-size: 40px; margin-bottom: 1rem; }
    .empty-text { font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" viewBox="0 0 24 24" fill="#1DB954">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
      </svg>
      <div>
        <div class="title">Music Recommender</div>
        <div class="subtitle">Powered by ML · 81K+ tracks</div>
      </div>
    </div>

    <div class="search-box">
      <span style="color:#888">♪</span>
      <input id="trackInput" placeholder="Enter a song name..." />
    </div>

    <div class="artist-box">
      <input id="artistInput" placeholder="Artist name (optional, helps with accuracy)" />
    </div>

    <button class="btn" id="searchBtn" onclick="getRecommendations()">
      Get Recommendations
    </button>

    <div class="error" id="errorBox"></div>
    <div class="loading" id="loadingBox">Finding similar tracks...</div>

    <div id="resultsBox">
      <div class="empty">
        <div class="empty-icon">♫</div>
        <div class="empty-text">Search for a song to get started</div>
      </div>
    </div>
  </div>

  <script>
    const emojis = ['🎵','🎸','🎹','🥁','🎺','🎷','🎻','🪗'];

    async function getRecommendations() {
      const track = document.getElementById('trackInput').value.trim();
      const artist = document.getElementById('artistInput').value.trim();
      const btn = document.getElementById('searchBtn');
      const errorBox = document.getElementById('errorBox');
      const loadingBox = document.getElementById('loadingBox');
      const resultsBox = document.getElementById('resultsBox');

      if (!track) {
        errorBox.textContent = 'Please enter a song name.';
        errorBox.classList.add('active');
        return;
      }

      errorBox.classList.remove('active');
      btn.disabled = true;
      btn.textContent = 'Searching...';
      loadingBox.classList.add('active');
      resultsBox.innerHTML = '';

      try {
        const body = { track_name: track, min_popularity: 60 };
        if (artist) body.artist = artist;

        const res = await fetch('/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Track not found.');

        loadingBox.classList.remove('active');

        const titleEl = document.createElement('div');
        titleEl.className = 'results-title';
        titleEl.textContent = `Because you like "${data.query}"`;
        resultsBox.appendChild(titleEl);

        data.recommendations.forEach((track, i) => {
          const el = document.createElement('div');
          el.className = 'track';
          el.style.animationDelay = `${i * 0.05}s`;
          el.innerHTML = `
            <div class="track-num">${i + 1}</div>
            <div class="track-art">${emojis[i % emojis.length]}</div>
            <div class="track-info">
              <div class="track-name">${track.track_name}</div>
              <div class="track-artist">${track.artists}</div>
            </div>
            <div class="pop-badge">${track.popularity}</div>
          `;
          resultsBox.appendChild(el);
        });

      } catch (err) {
        loadingBox.classList.remove('active');
        errorBox.textContent = err.message;
        errorBox.classList.add('active');
      }

      btn.disabled = false;
      btn.textContent = 'Get Recommendations';
    }

    document.getElementById('trackInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') getRecommendations();
    });
  </script>
</body>
</html>
